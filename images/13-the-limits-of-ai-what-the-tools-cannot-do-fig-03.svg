<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-13-03">
  <title id="fig-title-13-03">The categorical boundary</title>
  <desc>A schematic of the world containing a smaller data sample. Scaling enlarges the sample's covered region, but the enlarged region still has a boundary, defined by what the sampling excluded; the gap between boundary and world is where deployments fail.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
    </marker>
    <marker id="arrow-grey" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#545454"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="700" height="480" fill="#FFFFFF"/>

  <text x="32" y="48" font-family="'EB Garamond', 'Garamond', Georgia, serif" font-size="16" fill="#2a1a0e">The categorical boundary</text>
  <text x="32" y="66" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">A sample cannot contain the structure of what it excluded &#8212; the exclusion is what made it a sample.</text>

  <!-- the world -->
  <rect x="32" y="84" width="636" height="330" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="48" y="106" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" letter-spacing="0.08em" fill="#545454">THE WORLD</text>

  <!-- scaled model boundary (RED - the concept) -->
  <rect x="64" y="132" width="336" height="238" fill="#FFFFFF" fill-opacity="0" stroke="#C8102E" stroke-width="1.5"/>
  <text x="76" y="152" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#C8102E">scaled model &#8212; more data</text>

  <!-- the data (a sample) -->
  <rect x="96" y="180" width="200" height="140" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1"/>
  <text x="196" y="242" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="12" fill="#2a1a0e">the data</text>
  <text x="196" y="258" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">(a sample)</text>

  <!-- scaling arrow from sample edge to scaled boundary -->
  <line x1="296" y1="250" x2="396" y2="250" stroke="#545454" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-grey)"/>
  <text x="346" y="240" text-anchor="middle" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454">add data</text>

  <!-- boundary annotation -->
  <line x1="470" y1="180" x2="404" y2="200" stroke="#2a1a0e" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="476" y="172" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" font-weight="600" fill="#2a1a0e">the boundary moves &#8212;</text>
  <text x="476" y="187" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" font-weight="600" fill="#2a1a0e">it never disappears.</text>
  <text x="476" y="202" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454">defined by what the</text>
  <text x="476" y="215" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="10" fill="#545454">sampling excluded</text>

  <!-- gap annotation -->
  <line x1="476" y1="300" x2="430" y2="300" stroke="#2a1a0e" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="484" y="296" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#2a1a0e">the gap lives here &#8212;</text>
  <text x="484" y="311" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#2a1a0e">where deployments fail</text>

  <!-- footer -->
  <text x="32" y="446" font-family="'Inter', -apple-system, 'Helvetica Neue', sans-serif" font-size="11" fill="#545454">Wider sample and excluded region are complementary by construction (Hume, 1748).</text>
</svg>
